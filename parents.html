<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <title>Parent Dashboard</title>
  <style>
    /* ... [Keeping your existing CSS] ... */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; color: #1e293b; padding-bottom: 60px; }
    .site-header { background: #741b47; width: 100%; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; margin-bottom: 0; }
    .site-header h1 { font-family: 'Cinzel Decorative', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif; color: #f9e7f0; font-size: clamp(1rem, 3.5vw, 2rem); text-align: center; font-weight: 400; line-height: 1.5; letter-spacing: 2px; }
    .site-header .page-label { font-size: 12px; color: #e8b4cc; text-transform: uppercase; letter-spacing: 3px; margin-top: 10px; }
    .date-bar { background: #1e293b; color: #e2e8f0; text-align: center; padding: 10px 20px; font-size: 14px; font-weight: 600; letter-spacing: 1px; }
    .day-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 14px 24px; background: white; border-bottom: 1px solid #e2e8f0; margin-bottom: 24px; }
    .day-nav button { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; transition: background 0.15s; }
    .day-nav button:hover { background: #f1f5f9; }
    .day-nav button:disabled { opacity: 0.35; cursor: default; background: white; }
    .day-nav .current-day { font-size: 15px; font-weight: 700; color: #1e293b; min-width: 220px; text-align: center; }
    .stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; padding: 0 24px; margin-bottom: 24px; max-width: 900px; margin-left: auto; margin-right: auto; }
    .stat-card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; text-align: center; }
    .stat-card .stat-num { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-card .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
    .nav-links { display: flex; justify-content: flex-end; gap: 16px; padding: 10px 24px 0; max-width: 1200px; margin: 0 auto; }
    .nav-links a { font-size: 12px; color: #94a3b8; text-decoration: none; transition: color 0.15s; }
    .nav-links a:hover { color: #475569; }
    .students-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 0 24px; max-width: 1200px; margin: 0 auto; }
    .student-card { background: white; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
    .student-header { padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
    .student-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: white; flex-shrink: 0; background: rgba(0,0,0,0.2); line-height: 1.1; text-align: center; }
    .student-name { font-size: 17px; font-weight: 700; flex: 1; color: white; }
    .student-pill { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: rgba(0,0,0,0.2); color: white; white-space: nowrap; }
    .student-progress-bar { height: 4px; background: #e2e8f0; }
    .student-progress-fill { height: 100%; transition: width 0.4s ease; }
    .task-list { padding: 4px 0; }
    .task-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 18px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.12s; position: relative; }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: #fafafa; }
    .task-row.is-done { opacity: 0.6; background: #f8fafc; }
    .task-checkbox { width: 20px; height: 20px; border-radius: 5px; border: 2px solid #cbd5e1; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .task-row.is-done .task-checkbox::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); }
    .task-info { flex: 1; min-width: 0; }
    .task-subject { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1px; }
    .task-curriculum { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
    .task-text { font-size: 13px; color: #334155; line-height: 1.4; }
    .task-row.is-done .task-text { text-decoration: line-through; color: #94a3b8; }
    .task-check-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
    .link-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; text-decoration: none; color: white; margin-top: 4px; position: relative; z-index: 10; }
    .link-btn::before { content: '↗'; }
    .link-btn:hover { opacity: 0.85; }
    .approve-btn { background: #741b47; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .approve-btn:hover { background: #5a1436; }
    .approve-btn:disabled { background: #cbd5e1; cursor: default; }
    .week-link { display: block; text-align: center; padding: 10px; font-size: 12px; color: #94a3b8; text-decoration: none; border-top: 1px solid #f1f5f9; transition: background 0.15s; }
    .week-link:hover { color: #475569; background: #f8fafc; }
    .no-tasks { padding: 24px 18px; font-size: 13px; color: #94a3b8; text-align: center; }
    .no-school { text-align: center; padding: 48px 20px; color: #94a3b8; font-size: 15px; }
    .no-school strong { display: block; font-size: 22px; color: #cbd5e1; margin-bottom: 8px; }
    .loading { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }

.admin-section { margin-bottom: 4px; }
.admin-section-label { 
  font-size: 10px; 
  font-weight: 700; 
  text-transform: uppercase; 
  letter-spacing: 1px; 
  color: #94a3b8; 
  margin-bottom: 6px; 
  padding-bottom: 4px;
  border-bottom: 1px solid #f1f5f9;
}
.admin-actions { display: flex; flex-wrap: wrap; gap: 8px; }
.admin-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: #334155;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  min-width: 130px;
  text-align: left;
}
.admin-btn:hover { background: #f1f5f9; border-color: #cbd5e1; }
.admin-btn.danger { color: #dc2626; }
.admin-btn.danger:hover { background: #fef2f2; border-color: #fca5a5; }
.admin-btn-sub { 
  font-size: 10px; 
  font-weight: 400; 
  color: #94a3b8; 
  margin-top: 2px; 
}
.view-toggle-pill {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  margin-left: 4px;
}
.view-toggle-pill:hover {
  background: rgba(255,255,255,0.25);
}
.task-section-label {
  padding: 8px 18px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: #f8fafc;
  border-bottom: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.past-due-label {
  color: #dc2626;
  background: #fef2f2;
  border-color: #fca5a5;
}
.past-due-subject-header {
  padding: 6px 18px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  background: #f8fafc;
  border-bottom: 1px solid #f1f5f9;
  display: flex;
  align-items: center;
  gap: 8px;
}
.past-due-curriculum {
  font-size: 10px;
  font-weight: 400;
  color: #94a3b8;
  text-transform: none;
}
.past-due-date {
  font-size: 10px;
  color: #dc2626;
  font-weight: 600;
  margin-left: 6px;
}
.chore-section-label {
  padding: 8px 18px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: #fefce8;
  border-bottom: 1px solid #fde68a;
  border-top: 1px solid #fde68a;
  color: #92400e;
}
  </style>
</head>
<body>

<div class="site-header" id="siteHeader">
  <h1 id="headerTitle">Thus Far the Lord<br>Has Helped Us</h1>
  <div class="page-label">Parents Dashboard</div>
</div> <div class="day-nav">
  <button id="prevDay" onclick="changeDay(-1)">← Previous</button>
  <div class="current-day" id="currentDayLabel">Loading Date...</div>
  <button id="nextDay" onclick="changeDay(1)">Next →</button><br/>
  <span id="syncTimer" style="display:none; font-size:11px; color:#94a3b8; font-style:italic;"></span>
  <button id="refreshBtn" onclick="forceRefresh()" style="font-size:11px; color:#94a3b8; background:transparent; border:none; padding:4px 6px; border-radius:6px; cursor:pointer; opacity:0.6;">↻</button>
</div>

<div id="statsStrip" class="stats-strip"></div>
  
<div class="date-bar" id="dateBar" style="display:none;"></div> <div class="nav-links">
  <a id="homeLink" href="index.html">&#8592; Assignments</a>
</div>

<div id="content" class="loading">Loading assignments...</div>

<script src="utils.js"></script>  
<script>
  // 1. Globals

  let currentDate = new Date();
  currentDate.setHours(0, 0, 0, 0);
  let allData = null;
  const cardViewState = {}; // studentName -> 'today' | 'both' | 'pastdue'
  let globalViewMode = 'auto'; // 'auto' | 'pastdue'

  // 2. Utility functions
  function getChoreId(studentName, date) {
    const d = new Date(date);
    return `${studentName}-chore-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function statCard(num, label, color) {
    return `<div class="stat-card"><div class="stat-num" style="color:${color};">${num}</div><div class="stat-label">${label}</div></div>`;
  }


  // 3. Sync Actions


function forceRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = 'Checking...';
  btn.disabled = true;

  fetch('data.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      const newTime = new Date(data.generated).getTime();
      const oldTime = allData && allData.generated ? new Date(allData.generated).getTime() : 0;

      if (newTime > oldTime) {
        const studentDataWithChores = mergeChoresIntoStudentData(data);
        allData = { students: studentDataWithChores, config: data.config, generated: data.generated };
        renderForDate(currentDate);
        showTimestamp(data.generated);
        btn.textContent = '✓ Updated!';
      }
      btn.style.opacity = '0.6';
      btn.style.color = '#94a3b8';
      btn.style.fontWeight = 'normal';
      btn.onclick = forceRefresh;

      setTimeout(() => {
        btn.textContent = '↻';
        btn.disabled = false;
      }, 2000);
    })
    .catch(() => {
      btn.textContent = 'Error — try again';
      btn.disabled = false;
    });
}

function updateColors(palette, headerColor) {
  if (!palette) return;
  const root = document.documentElement;
  root.style.setProperty('--primary', palette.primary);
  root.style.setProperty('--secondary', palette.secondary);
  root.style.setProperty('--bg', palette.bg || '#f8fafc');

  const header = document.getElementById('siteHeader');
  if (header) {
    const topColor = headerColor || '#741b47';
    const svg = `<svg width='1920' height='1080' viewBox='0 0 1920 1080' xmlns='http://www.w3.org/2000/svg'>
      <defs>
        <linearGradient id='grad' x1='0%' y1='0%' x2='0%' y2='100%'>
          <stop offset='0%' style='stop-color:${topColor};stop-opacity:1'/>
          <stop offset='100%' style='stop-color:#5D87A0;stop-opacity:1'/>
        </linearGradient>
      </defs>
      <rect width='1920' height='1080' fill='url(%23grad)'/>
    </svg>`;
    header.style.background = 'url("data:image/svg+xml,' + encodeURIComponent(svg) + '") center/cover no-repeat';
  }
}

  // 5. Everything else
window.onload = function() {
  // Set the date label immediately so it shows before render completes
  const dateStr = currentDate.toLocaleDateString('en-US', { 
    weekday: 'long', month: 'long', day: 'numeric' 
  });
  document.getElementById('currentDayLabel').textContent = dateStr;

  fetch('data.json?v=' + new Date().getTime())
    .then(r => {
      if (!r.ok) throw new Error("File not found on server");
      return r.json();
    })
    .then(function(data) {
      const studentDataWithChores = mergeChoresIntoStudentData(data);
      allData = {
        students: studentDataWithChores,
        config: data.config,
        generated: data.generated
      };
    
      if (data.config) applyHeaderSettings(data.config);
      showTimestamp(data.generated);

      // Render immediately with local progress
      renderForDate(currentDate);

      // Then fetch server progress and re-render silently
      fetchAndMergeProgress().then(() => {
        renderForDate(currentDate);
        updateMakeupToggleBtn(allData.config && allData.config.makeupDaysEnabled !== false);
      });
    })
    .catch(e => {
      const content = document.getElementById('content');
      if (content) {
        content.innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626;">Error loading data: ${e.message}</div>`;
      }
    });
};

function applyHeaderSettings(config) {
  if (config.headerText) {
    const words = config.headerText.split(' ');
    const mid = Math.ceil(words.length / 2);
    document.getElementById('headerTitle').innerHTML = 
      words.slice(0, mid).join(' ') + '<br>' + words.slice(mid).join(' ');
  }
  if (config.headerColor) {
    document.getElementById('siteHeader').style.background = config.headerColor;
  }
}

  function renderForDate(date) {
    if (!allData || !allData.students) return;
    
    const targetDate = new Date(date);
    const targetMidnight = Date.UTC(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
    const nowMidnight = Date.UTC(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
    
    const dateStr = targetDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    const dayName = targetDate.toLocaleDateString('en-US', { weekday: 'long' });
    document.getElementById('currentDayLabel').textContent = dateStr;

    const filtered = allData.students.map(function(s) {
      let dailyTasks = [];
      let pastDueTasks = {}; 

      if (s.grid && Array.isArray(s.grid)) {
        s.grid.forEach(subject => {
          if (subject.tasks) {
            subject.tasks.forEach(t => {
              const d = new Date(t.rawDate);
              const taskMidnight = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());

              if (taskMidnight === targetMidnight && t.task && t.task.trim() !== '') {
                const localProgress = getLocalProgress();
                const isDone = localProgress[t.id] !== undefined ? localProgress[t.id] : t.done;
                dailyTasks.push({ ...t, done: isDone, subject: subject.subject, curriculum: subject.curriculum });
              }

              if (taskMidnight < nowMidnight && t.task && t.task.trim() !== '') {
                const localProgress = getLocalProgress();
                const isDone = localProgress[t.id] !== undefined ? localProgress[t.id] : t.done;
                if (!isDone) {
                  if (!pastDueTasks[subject.subject]) {
                    pastDueTasks[subject.subject] = {
                      curriculum: subject.curriculum,
                      tasks: [],
                      oldestDate: Infinity
                    };
                  }
                  pastDueTasks[subject.subject].tasks.push({ ...t, done: isDone, subject: subject.subject, curriculum: subject.curriculum });
                  if (taskMidnight < pastDueTasks[subject.subject].oldestDate) {
                    pastDueTasks[subject.subject].oldestDate = taskMidnight;
                  }
                }
              }
            });
          }
        });
      }

      Object.values(pastDueTasks).forEach(subj => {
        subj.tasks.sort((a, b) => a.rawDate - b.rawDate);
      });

      const sortedPastDue = Object.entries(pastDueTasks)
        .sort((a, b) => a[1].oldestDate - b[1].oldestDate)
        .map(([subject, data]) => ({ subject, ...data }));

      const incompleteToday = dailyTasks.filter(t => !t.done).length;
      let autoView;
      if (incompleteToday >= 3) autoView = 'today';
      else if (incompleteToday > 0) autoView = 'both';
      else autoView = 'pastdue';

      const studentConfig = allData.students.find(sc => sc.student === s.student);
      const chore = studentConfig && studentConfig.chore ? studentConfig.chore : null;
      
      return {
        student: s.student,
        palette: s.palette,
        week: s.weekNum,
        dayName,
        tasks: dailyTasks,
        pastDue: sortedPastDue,
        autoView,
        chore: chore  // Always show if it exists, no threshold
      };
    }).filter(s => s.tasks.length > 0 || s.pastDue.length > 0);

    renderStats(filtered);

    const contentDiv = document.getElementById('content');
    if (filtered.length === 0) {
      contentDiv.innerHTML = '<div class="no-school"><strong>No Assignments Found</strong>There are no tasks scheduled near this date.</div>';
    } else {
      let html = '<div class="students-grid">';
      filtered.forEach(s => { html += buildStudentCard(s); });
      html += buildAdminCard();
      html += '</div>';
      contentDiv.innerHTML = html;
    }
    
    updateNavButtons();
  }

function buildStudentCard(s) {
  const done = s.tasks.filter(t => t.done).length;
  const total = s.tasks.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const viewMode = cardViewState[s.student] || (globalViewMode === 'pastdue' ? 'pastdue' : s.autoView);
  const viewLabels = { today: 'Today', both: 'Today + Past Due', pastdue: 'Past Due' };

  let html = `<div class="student-card" id="scard-${s.student}">
    <div class="student-header" style="background:${s.palette.primary};">
      <div class="student-avatar">${pct === 100 ? '✓' : pct + '%'}</div>
      <span class="student-name">${s.student}</span>
      <span class="student-pill">${done}/${total}</span>
      <button class="view-toggle-pill" onclick="cycleCardView('${s.student}', event)"
        title="Switch view">${viewLabels[viewMode]}</button>
    </div>
    <div class="student-progress-bar">
      <div class="student-progress-fill" style="width:${pct}%; background:${s.palette.secondary};"></div>
    </div>`;

  if (viewMode === 'today' || viewMode === 'both') {
    html += `
    <div class="task-section-label" style="color:${s.palette.primary};">
      ${s.dayName.toUpperCase()}'S TASKS
      <button class="approve-btn" onclick="approveEntireDay('${s.student}')">Mark All Done</button>
    </div>
    <div class="task-list">`;
    if (s.tasks.length === 0) {
      html += `<div class="no-tasks">No tasks today</div>`;
    } else {
      s.tasks.forEach(t => { html += buildTaskRow(t, s.palette, false, s.student); });
    }
    html += `</div>`;
  }

  if ((viewMode === 'pastdue' || viewMode === 'both') && s.pastDue.length > 0) {
    html += `<div class="task-section-label past-due-label">PAST DUE</div>`;
    s.pastDue.forEach(subj => {
      html += `<div class="past-due-subject-header" style="color:${s.palette.primary};">
        ${subj.subject}
        ${subj.curriculum ? `<span class="past-due-curriculum">${subj.curriculum}</span>` : ''}
      </div>
      <div class="task-list">`;
      subj.tasks.forEach(t => { html += buildTaskRow(t, s.palette, true, s.student); });
      html += `</div>`;
    });
  }

  if ((viewMode === 'pastdue' || viewMode === 'both') && s.pastDue.length === 0) {
    html += `<div class="no-tasks" style="color:#16a34a;">✓ No past due assignments</div>`;
  }

  if (s.chore) {
    html += buildChoreRow(s.student, s.chore, s.palette, currentDate);
  }
  
  html += `<a class="week-link" href="index.html?student=${encodeURIComponent(s.student)}">
    Full Week View ↗
  </a></div>`;

  return html;
}

  function onStorageChange() {
    renderForDate(currentDate);
  }
  
function buildTaskRow(t, palette, isPastDue, studentName) {
  const dateLabel = isPastDue ? `<span class="past-due-date">${t.date}</span>` : '';
  return `
    <div class="task-row ${t.done ? 'is-done' : ''}" id="prow-${t.id}"
      onclick="toggleTask('${t.id}', '${palette.primary}', '${palette.secondary}', '${studentName}', ${t.row || 0}, ${t.col || 0})">
      <div class="task-checkbox" style="${t.done ? `background:${palette.secondary};border-color:${palette.secondary}` : ''}">
        ${t.done ? `<span style="display:block;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);"></span>` : ''}
      </div>
      <div class="task-info">
        ${isPastDue ? '' : `<div class="task-subject" style="color:${palette.primary};">${t.subject}</div>`}
        <div class="task-text">${t.task}${dateLabel}</div>
      </div>
    </div>`;
}

function buildChoreRow(studentName, chore, palette, date) {
  const id = getChoreId(studentName, date);
  const localProgress = getLocalProgress();
  const isDone = localProgress[id] === true;

  return `
    <div class="chore-section-label">Last but Not Least</div>
    <div class="task-row ${isDone ? 'is-done' : ''}" id="prow-${id}"
      onclick="toggleTask('${id}', '${palette.primary}', '${palette.secondary}', '${studentName}', 0, 0)">
      <div class="task-checkbox" style="${isDone ? `background:${palette.secondary};border-color:${palette.secondary}` : ''}">
        ${isDone ? `<span style="display:block;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);"></span>` : ''}
      </div>
      <div class="task-info">
        <div style="display:flex; align-items:center; justify-content:space-between;">
          <div class="task-subject" style="color:${palette.primary};">Daily Chore</div>
          <button onclick="editChore('${studentName}', event)" 
            style="font-size:11px; color:#94a3b8; background:none; border:none; cursor:pointer; padding:2px 6px;">
            ✏️ edit
          </button>
        </div>
        <div class="task-text" id="chore-text-${studentName}">${chore}</div>
        <div id="chore-edit-${studentName}" style="display:none; margin-top:6px;">
          <input type="text" id="chore-input-${studentName}" value="${chore}"
            style="width:100%; padding:6px 10px; border:1px solid #cbd5e1; border-radius:6px; font-size:13px;"
            onclick="event.stopPropagation()">
          <div style="display:flex; gap:8px; margin-top:6px;">
            <button onclick="saveChore('${studentName}', event)"
              style="flex:1; padding:6px; background:#16a34a; color:white; border:none; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer;">
              Save
            </button>
            <button onclick="cancelChoreEdit('${studentName}', event)"
              style="flex:1; padding:6px; background:#f1f5f9; color:#475569; border:1px solid #e2e8f0; border-radius:6px; font-size:12px; cursor:pointer;">
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>`;
}

function editChore(studentName, event) {
  event.stopPropagation();
  document.getElementById('chore-text-' + studentName).style.display = 'none';
  document.getElementById('chore-edit-' + studentName).style.display = 'block';
  document.getElementById('chore-input-' + studentName).focus();
}

function cancelChoreEdit(studentName, event) {
  event.stopPropagation();
  document.getElementById('chore-text-' + studentName).style.display = 'block';
  document.getElementById('chore-edit-' + studentName).style.display = 'none';
}

function saveChore(studentName, event) {
  event.stopPropagation();
  const newChore = document.getElementById('chore-input-' + studentName).value.trim();
  if (!newChore) return;

  const textEl = document.getElementById('chore-text-' + studentName);
  const editEl = document.getElementById('chore-edit-' + studentName);

  textEl.textContent = 'Saving...';
  textEl.style.display = 'block';
  editEl.style.display = 'none';

  // Update in allData so re-renders stay current
  allData.students.forEach(s => {
    if (s.student === studentName) s.chore = newChore;
  });

  // Save to GAS then push
  fetch(`${API_URL}?action=updateChore&student=${encodeURIComponent(studentName)}&chore=${encodeURIComponent(newChore)}`, 
    { mode: 'no-cors' }
  );

  // Push after a short delay to let the write complete
  setTimeout(() => {
    fetch(`${API_URL}?action=push`, { mode: 'no-cors' });
    textEl.textContent = newChore;
    adminStatus('✓ Chore updated and push triggered.', '#16a34a');
  }, 2000);
}
  
function renderStats(filtered) {
  let total = 0, done = 0, choreTotal = 0, choreDone = 0;
  const lp = getLocalProgress();

  filtered.forEach(s => { 
    total += s.tasks.length; 
    done += s.tasks.filter(t => lp[t.id] !== undefined ? lp[t.id] : t.done).length;

    // Count chore if student has one
    if (s.chore) {
      choreTotal++;
      const choreId = getChoreId(s.student, currentDate);
      if (lp[choreId] === true) choreDone++;
    }
  });

  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  const statsStrip = document.getElementById('statsStrip');
  if (statsStrip) {
    statsStrip.innerHTML = 
      statCard(done, 'Done', '#16a34a') + 
      statCard(total - done, 'Remaining', '#dc2626') + 
      statCard(total, 'Total Tasks', '#475569') + 
      statCard(pct + '%', 'Complete', '#0284c7') +
      (choreTotal > 0 ? statCard(`${choreDone}/${choreTotal}`, 'Chores', choreDone === choreTotal ? '#16a34a' : '#f59e0b') : '');
  }
}

function toggleTask(id, palettePrimary, paletteSecondary, studentName, row, col) {
  const rowEl = document.getElementById('prow-' + id);
  if (!rowEl) return;
  
  const isDone = !rowEl.classList.contains('is-done');
  rowEl.classList.toggle('is-done', isDone);

  const checkbox = rowEl.querySelector('.task-checkbox');
  if (checkbox) {
    if (isDone) {
      checkbox.style.background = paletteSecondary;
      checkbox.style.borderColor = paletteSecondary;
      checkbox.innerHTML = `<span style="display:block;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);"></span>`;
    } else {
      checkbox.style.background = '';
      checkbox.style.borderColor = '';
      checkbox.innerHTML = '';
    }
  }

  setLocalProgress(id, isDone);

  if (id.includes('-chore-')) {
    // Always derive student name from chore id to be safe
    const choreStudent = id.split('-chore-')[0];
    fetch(`${API_URL}?action=toggle&key=${encodeURIComponent(id)}&status=${isDone}&student=${encodeURIComponent(choreStudent)}`, 
      { mode: 'no-cors' });
  } else {
    allData.students.forEach(s => {
      s.grid.forEach(subj => {
        subj.tasks.forEach(t => { if (t.id === id) t.done = isDone; });
      });
    });
    fetch(`${API_URL}?action=toggle&key=${encodeURIComponent(id)}&status=${isDone}&student=${encodeURIComponent(studentName)}&row=${row}&col=${col}`, 
      { mode: 'no-cors' });
    startSyncTimer();
  }

  try {
    const card = rowEl.closest('.student-card');
    if (card) updateCardStats(card);
  } catch(e) { console.warn('updateCardStats failed:', e); }
}

  
  function updateCardStats(card) {
    const total = card.querySelectorAll('.task-row').length;
    const done = card.querySelectorAll('.task-row.is-done').length;
    const pct = Math.round((done / total) * 100);
    card.querySelector('.student-pill').textContent = done + '/' + total;
    card.querySelector('.student-avatar').textContent = pct === 100 ? '✓' : pct + '%';
    card.querySelector('.student-progress-fill').style.width = pct + '%';
    
    const allTotal = document.querySelectorAll('.task-row').length;
    const allDone = document.querySelectorAll('.task-row.is-done').length;
    const allPct = Math.round((allDone / allTotal) * 100);
    const statCards = document.getElementById('statsStrip').querySelectorAll('.stat-num');
    statCards[0].textContent = allDone;
    statCards[1].textContent = allTotal - allDone;
    statCards[3].textContent = allPct + '%';
  }

  function changeDay(direction) {
    currentDate = new Date(currentDate.getTime() + direction * 24 * 60 * 60 * 1000);
    renderForDate(currentDate);
  }

  }

function approveEntireDay(studentName, silent) {
  const student = allData.students.find(s => s.student === studentName);
  if (!student) return;
  if (!silent && !confirm(`Mark everything today for ${studentName} as done?`)) return;

  const targetMidnight = Date.UTC(
    currentDate.getFullYear(), 
    currentDate.getMonth(), 
    currentDate.getDate()
  );

  student.grid.forEach(subj => {
    subj.tasks.forEach(t => {
      const d = new Date(t.rawDate);
      const taskMidnight = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      if (taskMidnight === targetMidnight && !t.done) {
        t.done = true;
        setLocalProgress(t.id, true);
        const row = document.getElementById('prow-' + t.id);
        if (row) {
          row.classList.add('is-done');
          const checkbox = row.querySelector('.task-checkbox');
          if (checkbox) {
            checkbox.style.background = student.palette.secondary;
            checkbox.style.borderColor = student.palette.secondary;
          }
        }
        // Pass cell address
        fetch(`${API_URL}?action=toggle&key=${encodeURIComponent(t.id)}&status=true&student=${encodeURIComponent(studentName)}&row=${t.row}&col=${t.col}`, 
          { mode: 'no-cors' });
      }
    });
  });

  if (!silent) renderForDate(currentDate);
}

function toggleMakeupDays() {
  const statusEl = document.getElementById('makeupToggleStatus');
  const btn = document.getElementById('makeupToggleBtn');
  
  // Determine flip
  const currentlyEnabled = statusEl.textContent.trim() === "ON";
  const newState = !currentlyEnabled;

  statusEl.textContent = "Updating...";
  btn.disabled = true;

  // This calls your GAS Web App URL
  const url = `${api_url}?action=setMakeupDays&enabled=${newState}`;

  fetch(url)
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        statusEl.textContent = newState ? "ON" : "OFF";
        btn.classList.toggle('active-state', newState); // Optional CSS class change
        
        // Alert the user or log success
        console.log("GitHub Sync Triggered");
      }
    })
    .catch(err => alert("Error: " + err))
    .finally(() => { btn.disabled = false; });
}

function updateMakeupToggleBtn(enabled) {
  const sub = document.getElementById('makeupToggleStatus');
  if (sub) sub.textContent = enabled ? 'Currently ON' : 'Currently OFF';
}

  function buildAdminCard() {
    return `<div class="student-card">
      <div class="student-header" style="background:#334155;">
        <div class="student-avatar" style="font-size:18px;">⚙</div>
        <span class="student-name">Admin</span>
      </div>
      <div class="task-list" style="padding: 12px 18px; display:flex; flex-direction:column; gap:10px;">
        <div class="admin-section">
          <div class="admin-section-label">Data</div>
          <div class="admin-actions">
            <button class="admin-btn" onclick="adminPush()">⬆ Push an Update</button>
            <button class="admin-btn danger" onclick="adminClearProgress()">✕ Local Cache</button>
          </div>
        </div>
        <div class="admin-section">
          <div class="admin-section-label">Navigation</div>
          <div class="admin-actions">
            <button class="admin-btn" onclick="window.location.href='index.html'">📋 Student Planner</button>
            <button class="admin-btn" onclick="window.open('${API_URL}?page=config', '_blank')">🔧 System Config</button>
          </div>
        </div>
        <div class="admin-section">      
          <div class="admin-section-label">View</div>
          <div class="admin-actions">
            <button class="admin-btn" onclick="adminGoToToday()">📅 Jump to Today</button>
            <button class="admin-btn" onclick="adminApproveAll()">✓ Today Complete</button>
            <button class="admin-btn" onclick="setGlobalView('auto')">⚡ Auto View</button>
            <button class="admin-btn" onclick="setGlobalView('pastdue')">⏰ All Past Due</button>
            <button class="admin-btn" id="makeupToggleBtn" onclick="toggleMakeupDays()">
              📝 Make-up Days
              <span class="admin-btn-sub" id="makeupToggleStatus">Loading...</span>
            </button>            
          </div>
        </div>
        <div id="adminStatus" style="font-size:11px; color:#94a3b8; font-style:italic; text-align:center; min-height:16px;"></div>
      </div>
    </div>`;
  }

  function adminStatus(msg, color) {
    const el = document.getElementById('adminStatus');
    if (!el) return;
    el.textContent = msg;
    el.style.color = color || '#94a3b8';
    setTimeout(() => { el.textContent = ''; }, 4000);
  }

  function adminPush() {
    adminStatus('Pushing to GitHub...', '#f59e0b');
    fetch(`${API_URL}?action=push`, { mode: 'no-cors' })
      .then(() => {
        adminStatus('Push sent! Waiting for GitHub...', '#f59e0b');
        setTimeout(() => adminRefresh(), 8000);
      })
      .catch(() => adminStatus('Push failed — try again', '#dc2626'));
  }

function adminRefresh() {
  adminStatus('Fetching latest data...', '#f59e0b');
  fetch('data.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      const newTime = new Date(data.generated).getTime();
      const oldTime = allData && allData.generated ? new Date(allData.generated).getTime() : 0;
      if (newTime > oldTime) {
        // Merge chores same as window.onload
        const studentDataWithChores = mergeChoresIntoStudentData(data);
        allData = { 
          students: studentDataWithChores, 
          config: data.config, 
          generated: data.generated 
        };
        renderForDate(currentDate);
        adminStatus('✓ Data updated!', '#16a34a');
        showTimestamp(data.generated);
      } else {
        adminStatus('Already up to date.', '#94a3b8');
      }
    })
    .catch(() => adminStatus('Fetch failed — try again', '#dc2626'));
}

  function adminClearProgress() {
    if (confirm('Clear all locally cached progress? This won\'t affect the spreadsheet.')) {
      localStorage.removeItem('local_progress');
      renderForDate(currentDate);
      adminStatus('✓ Local cache cleared.', '#16a34a');
    }
  }

  function adminGoToToday() {
    currentDate = new Date();
    currentDate.setHours(0, 0, 0, 0);
    renderForDate(currentDate);
    adminStatus('✓ Jumped to today.', '#16a34a');
  }

  function adminApproveAll() {
    if (!confirm('Mark ALL tasks today as done for every student?')) return;
    allData.students.forEach(s => {
      approveEntireDay(s.student, true);
    });
    adminStatus('✓ All tasks marked done.', '#16a34a');
  }

  function cycleCardView(studentName, event) {
    event.stopPropagation();
    const viewStates = ['today', 'both', 'pastdue'];
    const current = cardViewState[studentName] || 'today';
    const next = viewStates[(viewStates.indexOf(current) + 1) % viewStates.length];
    cardViewState[studentName] = next;
    renderForDate(currentDate);
  }

  function setGlobalView(mode) {
    globalViewMode = mode;
    Object.keys(cardViewState).forEach(k => delete cardViewState[k]);
    renderForDate(currentDate);
  }
</script>
