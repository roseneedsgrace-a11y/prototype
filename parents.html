<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; color: #1e293b; padding-bottom: 60px; }
    .site-header { background: #741b47; width: 100%; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; margin-bottom: 0; }
    .site-header h1 { font-family: 'Cinzel Decorative', 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif; color: #f9e7f0; font-size: clamp(1rem, 3.5vw, 2rem); text-align: center; font-weight: 400; line-height: 1.5; letter-spacing: 2px; }
    .site-header .page-label { font-size: 12px; color: #e8b4cc; text-transform: uppercase; letter-spacing: 3px; margin-top: 10px; }
    .date-bar { background: #1e293b; color: #e2e8f0; text-align: center; padding: 10px 20px; font-size: 14px; font-weight: 600; letter-spacing: 1px; }
    .day-nav { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 14px 24px; background: white; border-bottom: 1px solid #e2e8f0; margin-bottom: 24px; }
    .day-nav button { background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; color: #475569; cursor: pointer; transition: background 0.15s; }
    .day-nav button:hover { background: #f1f5f9; }
    .day-nav button:disabled { opacity: 0.35; cursor: default; background: white; }
    .day-nav .current-day { font-size: 15px; font-weight: 700; color: #1e293b; min-width: 220px; text-align: center; }
    .stats-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; padding: 0 24px; margin-bottom: 24px; max-width: 900px; margin-left: auto; margin-right: auto; }
    .stat-card { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; text-align: center; }
    .stat-card .stat-num { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
    .stat-card .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
    .nav-links { display: flex; justify-content: flex-end; gap: 16px; padding: 10px 24px 0; max-width: 1200px; margin: 0 auto; }
    .nav-links a { font-size: 12px; color: #94a3b8; text-decoration: none; transition: color 0.15s; }
    .nav-links a:hover { color: #475569; }
    .students-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 0 24px; max-width: 1200px; margin: 0 auto; }
    .student-card { background: white; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
    .student-header { padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
    .student-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: white; flex-shrink: 0; background: rgba(0,0,0,0.2); line-height: 1.1; text-align: center; }
    .student-name { font-size: 17px; font-weight: 700; flex: 1; color: white; }
    .student-pill { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; background: rgba(0,0,0,0.2); color: white; white-space: nowrap; }
    .student-progress-bar { height: 4px; background: #e2e8f0; }
    .student-progress-fill { height: 100%; transition: width 0.4s ease; }
    .task-list { padding: 4px 0; }
    .task-row { display: flex; align-items: flex-start; gap: 12px; padding: 10px 18px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: background 0.12s; position: relative; }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: #fafafa; }
    .task-row.is-done { opacity: 0.6; background: #f8fafc; }
    .task-checkbox { width: 20px; height: 20px; border-radius: 5px; border: 2px solid #cbd5e1; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .task-row.is-done .task-checkbox::after { content: ''; display: block; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); }
    .task-info { flex: 1; min-width: 0; }
    .task-subject { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1px; }
    .task-curriculum { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
    .task-text { font-size: 13px; color: #334155; line-height: 1.4; }
    .task-row.is-done .task-text { text-decoration: line-through; color: #94a3b8; }
    .task-check-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
    .link-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; text-decoration: none; color: white; margin-top: 4px; position: relative; z-index: 10; }
    .link-btn::before { content: '↗'; }
    .link-btn:hover { opacity: 0.85; }
    .approve-btn { background: #741b47; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .approve-btn:hover { background: #5a1436; }
    .approve-btn:disabled { background: #cbd5e1; cursor: default; }
    .week-link { display: block; text-align: center; padding: 10px; font-size: 12px; color: #94a3b8; text-decoration: none; border-top: 1px solid #f1f5f9; transition: background 0.15s; }
    .week-link:hover { color: #475569; background: #f8fafc; }
    .no-tasks { padding: 24px 18px; font-size: 13px; color: #94a3b8; text-align: center; }
    .no-school { text-align: center; padding: 48px 20px; color: #94a3b8; font-size: 15px; }
    .no-school strong { display: block; font-size: 22px; color: #cbd5e1; margin-bottom: 8px; }
    .loading { text-align: center; padding: 60px 20px; color: #94a3b8; font-size: 14px; }
  </style>
</head>
<body>

<div class="site-header" id="siteHeader">
  <h1 id="headerTitle">Thus Far the Lord<br>Has Helped Us</h1>
  <div class="page-label">Parents Dashboard</div>
</div> <div class="day-nav">
  <button id="prevDay" onclick="changeDay(-1)">← Previous</button>
  <div class="current-day" id="currentDayLabel">Loading Date...</div>
  <button id="nextDay" onclick="changeDay(1)">Next →</button>
</div>

<div id="statsStrip" class="stats-strip"></div>
  
<div class="date-bar" id="dateBar" style="display:none;"></div> <div class="nav-links">
  <a id="homeLink" href="index.html">&#8592; Assignments</a>
</div>

<div id="content" class="loading">Loading assignments...</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbyrR-MFia5qvS53e84LvZbL1bKVMNd3paomGKq0nkvNZnILn5kLIOjPfu3DklQ9sPS66Q/exec'; 

  let currentDate = new Date();
  currentDate.setHours(0, 0, 0, 0);
  let allData = null;

    window.addEventListener('storage', function(e) {
      if (e.key === 'local_progress') {
        renderForDate(currentDate);
      }
    });
  
  window.onload = function() {
    fetch('data.json?v=' + new Date().getTime())
      .then(r => {
        if (!r.ok) throw new Error("File not found on server");
        return r.json();
      })
      .then(function(data) {
        // Map studentData to the format the dashboard expects
        allData = {
          students: data.studentData,
          config: data.config
        };

        if (data.config) {
          applyHeaderSettings(data.config);
        }

        renderForDate(currentDate);
      })
      .catch(e => {
        const content = document.getElementById('content');
        if (content) {
          content.innerHTML = `<div style="padding:40px;text-align:center;color:#dc2626;">Error loading data: ${e.message}</div>`;
        }
      });
  };

  function applyHeaderSettings(config) {
    if (config.headerText) {
      const words = config.headerText.split(' ');
      const mid = Math.ceil(words.length / 2);
      document.getElementById('headerTitle').innerHTML = words.slice(0, mid).join(' ') + '<br>' + words.slice(mid).join(' ');
    }
    if (config.headerColor) {
      document.getElementById('siteHeader').style.background = config.headerColor;
    }
  }

function renderForDate(date) {
  if (!allData || !allData.students) return;
  
  const targetDate = new Date(date);
  const targetMidnight = Date.UTC(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
  
  // Get the Day Name for the sub-header (e.g., "Monday")
  const dayName = targetDate.toLocaleDateString('en-US', { weekday: 'long' });
  const dateStr = targetDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  
  document.getElementById('currentDayLabel').textContent = dateStr;

  const filtered = allData.students.map(function(s) {
    let dailyTasks = [];
    
    if (s.grid && Array.isArray(s.grid)) {
      s.grid.forEach(subject => {
        if (subject.tasks) {
          subject.tasks.forEach(t => {
            const d = new Date(t.rawDate);
            const taskMidnight = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());

            // FIX: Check if date matches AND ensure the task text isn't empty/whitespace
            if (taskMidnight === targetMidnight && t.task && t.task.trim() !== "") {
              const localProgress = getLocalProgress();
              const isDone = localProgress[t.id] !== undefined ? localProgress[t.id] : t.done;
              
              dailyTasks.push({
                ...t,
                done: isDone,  // Local storage wins over JSON
                subject: subject.subject,
                curriculum: subject.curriculum
              });
            }
          });
        }
      });
    }

    return {
      student: s.student,
      palette: s.palette,
      week: s.weekNum,
      dayName: dayName, // Pass day name to the card builder
      tasks: dailyTasks
    };
  }).filter(s => s.tasks.length > 0);

  renderStats(filtered);

  const contentDiv = document.getElementById('content');
  if (filtered.length === 0) {
    contentDiv.innerHTML = '<div class="no-school"><strong>No Assignments Found</strong>There are no tasks scheduled for this specific date.</div>';
  } else {
    let html = '<div class="students-grid">';
    filtered.forEach(s => { html += buildStudentCard(s); });
    html += '</div>';
    contentDiv.innerHTML = html;
  }
  
  updateNavButtons();
}

function buildStudentCard(s) {
  const done = s.tasks.filter(t => t.done).length;
  const total = s.tasks.length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  
  let html = `<div class="student-card">
    <div class="student-header" style="background:${s.palette.primary};">
      <div class="student-avatar">${pct === 100 ? '✓' : pct + '%'}</div>
      <span class="student-name">${s.student}</span>
      <span class="student-pill">${done}/${total}</span>
    </div>
    <div class="student-progress-bar">
      <div class="student-progress-fill" style="width:${pct}%; background:${s.palette.secondary};"></div>
    </div>
    <div style="padding: 10px 18px; background: #fdf2f8; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;">
      <span style="font-size: 11px; font-weight: 700; color: #741b47;">${s.dayName.toUpperCase()}'S TASKS</span>
      <button class="approve-btn" onclick="approveEntireDay('${s.student}')">Mark All Done</button>
    </div>
    <div class="task-list">`;

  s.tasks.forEach(t => {
    const checkColor = t.done ? `background:${s.palette.secondary};border-color:${s.palette.secondary}` : '';
    // KEY CHANGE: div instead of label, onclick on the row itself
    html += `
      <div class="task-row ${t.done ? 'is-done' : ''}" id="prow-${t.id}" onclick="toggleTask('${t.id}', '${s.palette.secondary}')">
        <div class="task-checkbox" style="${checkColor}"></div>
        <div class="task-info">
          <div class="task-subject" style="color:${s.palette.primary};">${t.subject}</div>
          ${t.curriculum ? `<div class="task-curriculum">${t.curriculum}</div>` : ''}
          <div class="task-text">${t.task}</div>
        </div>
      </div>`;
  });

  html += `</div>
    <a class="week-link" href="index.html?student=${encodeURIComponent(s.student)}">Full Week View ↗</a>
  </div>`;
  return html;
}

  
  function renderStats(filtered) {
    let total = 0, done = 0;
    filtered.forEach(s => { 
      total += s.tasks.length; 
      done += s.tasks.filter(t => t.done).length; 
    });
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    const statsStrip = document.getElementById('statsStrip');
    if (statsStrip) {
      statsStrip.innerHTML = 
        statCard(done, 'Done', '#16a34a') + 
        statCard(total - done, 'Remaining', '#dc2626') + 
        statCard(total, 'Total Tasks', '#475569') + 
        statCard(pct + '%', 'Complete', '#0284c7');
    }
  }

function toggleTask(id, paletteSecondary) {
    const row = document.getElementById('prow-' + id);
    if (!row) return;
    
    const isDone = !row.classList.contains('is-done');
    row.classList.toggle('is-done', isDone);
  
    const checkbox = row.querySelector('.task-checkbox');
    if (checkbox) {
      checkbox.style.background = isDone ? paletteSecondary : '';
      checkbox.style.borderColor = isDone ? paletteSecondary : '';
    }
  
    // Save to local storage immediately
    setLocalProgress(id, isDone);
  
    // Update local data cache
    allData.students.forEach(s => {
      s.grid.forEach(subj => {
        subj.tasks.forEach(t => { if (t.id === id) t.done = isDone; });
      });
    });
  
    updateCardStats(row.closest('.student-card'));
    fetch(`${API_URL}?action=toggle&key=${encodeURIComponent(id)}&status=${isDone}`, { mode: 'no-cors' });
}


function approveEntireDay(studentName) {
  const student = allData.students.find(s => s.student === studentName);
  if (!student) return;
  
  if (!confirm(`Mark everything today for ${studentName} as done?`)) return;

  // Use UTC midnight comparison to avoid timezone issues
  const targetMidnight = Date.UTC(
    currentDate.getFullYear(), 
    currentDate.getMonth(), 
    currentDate.getDate()
  );

  student.grid.forEach(subj => {
    subj.tasks.forEach(t => {
      const d = new Date(t.rawDate);
      const taskMidnight = Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      
     if (taskMidnight === targetMidnight && !t.done) {
        t.done = true;
        setLocalProgress(t.id, true);
        const row = document.getElementById('prow-' + t.id);
        if (row) {
          row.classList.add('is-done');
          const checkbox = row.querySelector('.task-checkbox');
          if (checkbox) {
            checkbox.style.background = student.palette.secondary;
            checkbox.style.borderColor = student.palette.secondary;
          }
        }
        fetch(`${API_URL}?action=toggle&key=${encodeURIComponent(t.id)}&status=true`, { mode: 'no-cors' });
      }
    });
  });

  updateCardStats(document.querySelector(`.student-card .student-name`).closest('.student-card'));
  renderForDate(currentDate); // Re-render to update stats
}
  
  function updateCardStats(card) {
    const total = card.querySelectorAll('.task-row').length;
    const done = card.querySelectorAll('.task-row.is-done').length;
    const pct = Math.round((done / total) * 100);
    card.querySelector('.student-pill').textContent = done + '/' + total;
    card.querySelector('.student-avatar').textContent = pct === 100 ? '✓' : pct + '%';
    card.querySelector('.student-progress-fill').style.width = pct + '%';
    
    // Recalculate top stats strip
    const allTotal = document.querySelectorAll('.task-row').length;
    const allDone = document.querySelectorAll('.task-row.is-done').length;
    const allPct = Math.round((allDone / allTotal) * 100);
    const statCards = document.getElementById('statsStrip').querySelectorAll('.stat-num');
    statCards[0].textContent = allDone;
    statCards[1].textContent = allTotal - allDone;
    statCards[3].textContent = allPct + '%';
  }

  function changeDay(direction) {
    currentDate = new Date(currentDate.getTime() + direction * 24 * 60 * 60 * 1000);
    renderForDate(currentDate);
  }

  function updateNavButtons() {
    const prevBtn = document.getElementById('prevDay');
    const nextBtn = document.getElementById('nextDay');
    // Basic behavior: let them click. To strictly limit to available dates, 
    // you would scan allData.students for min/max rawDates.
  }

  // ─── LOCAL PROGRESS HELPERS ───────────────────

  function getLocalProgress() {
    return JSON.parse(localStorage.getItem('local_progress') || '{}');
  }
  
  function setLocalProgress(id, isDone) {
    const localProgress = getLocalProgress();
    localProgress[id] = isDone;
    localStorage.setItem('local_progress', JSON.stringify(localProgress));
  }
  

  function statCard(num, label, color) {
    return `<div class="stat-card"><div class="stat-num" style="color:${color};">${num}</div><div class="stat-label">${label}</div></div>`;
  }
</script>
</body>
</html>
